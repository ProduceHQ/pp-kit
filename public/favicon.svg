<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7A1A"/>
      <stop offset="100%" stop-color="#E05500"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="50%" stop-color="#111"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
  </defs>

  <!-- Camera body -->
  <rect x="5" y="6" width="22" height="12" rx="2" fill="url(#body)" stroke="#444" stroke-width="0.4"/>

  <!-- Top accent stripe -->
  <rect x="5" y="6" width="22" height="2.5" rx="2" fill="#555"/>
  <rect x="5" y="7.5" width="22" height="1" fill="#555"/>

  <!-- Film reels -->
  <circle cx="12" cy="5.5" r="3.5" fill="#1a1a1a" stroke="#444" stroke-width="0.4"/>
  <circle cx="12" cy="5.5" r="1.8" fill="none" stroke="#555" stroke-width="0.3"/>
  <circle cx="12" cy="5.5" r="0.6" fill="#666"/>
  <!-- Reel spokes -->
  <line x1="12" y1="3.7" x2="12" y2="7.3" stroke="#444" stroke-width="0.3"/>
  <line x1="10.2" y1="5.5" x2="13.8" y2="5.5" stroke="#444" stroke-width="0.3"/>

  <circle cx="21" cy="5.5" r="2.8" fill="#1a1a1a" stroke="#444" stroke-width="0.4"/>
  <circle cx="21" cy="5.5" r="1.4" fill="none" stroke="#555" stroke-width="0.3"/>
  <circle cx="21" cy="5.5" r="0.5" fill="#666"/>

  <!-- Lens mount -->
  <circle cx="10" cy="13" r="4.2" fill="url(#lens)" stroke="#555" stroke-width="0.5"/>
  <circle cx="10" cy="13" r="3" fill="#0a0a0a" stroke="#444" stroke-width="0.3"/>
  <circle cx="10" cy="13" r="1.8" fill="#111" stroke="#333" stroke-width="0.2"/>
  <!-- Lens reflection -->
  <ellipse cx="9.2" cy="12" rx="0.9" ry="0.5" fill="#fff" opacity="0.15" transform="rotate(-20 9.2 12)"/>

  <!-- Viewfinder -->
  <rect x="21" y="9.5" width="5.5" height="3" rx="0.6" fill="#222" stroke="#555" stroke-width="0.3"/>
  <rect x="22" y="10.3" width="3.5" height="1.5" rx="0.3" fill="#111" stroke="#444" stroke-width="0.2"/>

  <!-- Record indicator -->
  <circle cx="17" cy="10.5" r="0.8" fill="#fff"/>
  <circle cx="17" cy="10.5" r="1.2" fill="none" stroke="#888" stroke-width="0.3" opacity="0.4"/>

  <!-- Subtle body details -->
  <line x1="14" y1="14" x2="14" y2="17" stroke="#333" stroke-width="0.4" stroke-linecap="round"/>
  <line x1="15.5" y1="14" x2="15.5" y2="17" stroke="#333" stroke-width="0.4" stroke-linecap="round"/>

  <!-- KIT text -->
  <text x="16" y="25.5" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="6" font-weight="700" letter-spacing="1.8" fill="url(#accent)">KIT</text>

  <!-- Subtle underline accent -->
  <line x1="9" y1="27" x2="23" y2="27" stroke="url(#accent)" stroke-width="0.5" opacity="0.6" stroke-linecap="round"/>
</svg>

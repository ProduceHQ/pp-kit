<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7A1A"/>
      <stop offset="100%" stop-color="#E05500"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="50%" stop-color="#111"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
  </defs>

  <!-- Camera body (scaled down) -->
  <rect x="6" y="3" width="20" height="10" rx="1.8" fill="url(#body)" stroke="#444" stroke-width="0.4"/>

  <!-- Top accent stripe -->
  <rect x="6" y="3" width="20" height="2.2" rx="1.8" fill="#555"/>
  <rect x="6" y="4.5" width="20" height="0.7" fill="#555"/>

  <!-- Film reels -->
  <circle cx="13" cy="2.8" r="3" fill="#1a1a1a" stroke="#444" stroke-width="0.4"/>
  <circle cx="13" cy="2.8" r="1.5" fill="none" stroke="#555" stroke-width="0.3"/>
  <circle cx="13" cy="2.8" r="0.5" fill="#666"/>
  <line x1="13" y1="1.3" x2="13" y2="4.3" stroke="#444" stroke-width="0.3"/>
  <line x1="11.5" y1="2.8" x2="14.5" y2="2.8" stroke="#444" stroke-width="0.3"/>

  <circle cx="21" cy="2.8" r="2.3" fill="#1a1a1a" stroke="#444" stroke-width="0.4"/>
  <circle cx="21" cy="2.8" r="1.1" fill="none" stroke="#555" stroke-width="0.3"/>
  <circle cx="21" cy="2.8" r="0.4" fill="#666"/>

  <!-- Lens mount -->
  <circle cx="11" cy="9.5" r="3.6" fill="url(#lens)" stroke="#555" stroke-width="0.5"/>
  <circle cx="11" cy="9.5" r="2.5" fill="#0a0a0a" stroke="#444" stroke-width="0.3"/>
  <circle cx="11" cy="9.5" r="1.5" fill="#111" stroke="#333" stroke-width="0.2"/>
  <ellipse cx="10.3" cy="8.7" rx="0.7" ry="0.4" fill="#fff" opacity="0.15" transform="rotate(-20 10.3 8.7)"/>

  <!-- Viewfinder -->
  <rect x="21" y="6.5" width="4.5" height="2.5" rx="0.5" fill="#222" stroke="#555" stroke-width="0.3"/>
  <rect x="21.8" y="7.1" width="3" height="1.3" rx="0.3" fill="#111" stroke="#444" stroke-width="0.2"/>

  <!-- Record indicator -->
  <circle cx="17.5" cy="7.5" r="0.7" fill="#fff"/>
  <circle cx="17.5" cy="7.5" r="1" fill="none" stroke="#888" stroke-width="0.3" opacity="0.4"/>

  <!-- Grip lines -->
  <line x1="15" y1="10.5" x2="15" y2="12.5" stroke="#333" stroke-width="0.4" stroke-linecap="round"/>
  <line x1="16.3" y1="10.5" x2="16.3" y2="12.5" stroke="#333" stroke-width="0.4" stroke-linecap="round"/>

  <!-- KIT text - large -->
  <text x="16" y="26" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="2" fill="url(#accent)">KIT</text>

  <!-- Subtle underline accent -->
  <line x1="5" y1="28" x2="27" y2="28" stroke="url(#accent)" stroke-width="0.5" opacity="0.6" stroke-linecap="round"/>
</svg>
